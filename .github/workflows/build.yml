name: Build Unsigned IPA

on:
  push:
    tags:
      - 'v1*' # Triggers when you push a tag like v1, v1.0, etc.

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.2.app # Uses a modern Xcode version

      - name: Build App (Unsigned)
        run: |
          # 1. Clean and build the .app bundle without signing
          xcodebuild clean build \
            -project MusicPlayer.xcodeproj \
            -scheme MusicPlayer \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY="" \
            -derivedDataPath build

      - name: Package into IPA
        run: |
          # 2. Create the Payload folder and move the .app inside
          mkdir -p Payload
          # Path to the .app file generated by xcodebuild
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          
          # 3. Zip it into an .ipa file
          zip -r MusicPlayer_Unsigned.ipa Payload

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1
          name: Release v1 (Unsigned IPA)
          files: MusicPlayer_Unsigned.ipa
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
