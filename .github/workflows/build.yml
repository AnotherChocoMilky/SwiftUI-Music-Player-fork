name: Build Unsigned IPA

on:
  push:
    branches: [ "main", "master" ] # Runs every time you push code
  workflow_dispatch: # Allows you to run it manually from the UI

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build App (Unsigned)
        run: |
          # 1. Build the .app bundle
          # If your project name is different, change 'MusicPlayer' below
          xcodebuild clean build \
            -project MusicPlayer.xcodeproj \
            -scheme MusicPlayer \
            -sdk iphoneos \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            CODE_SIGNING_IDENTITY="" \
            -derivedDataPath build

      - name: Package into IPA
        run: |
          # 2. Create the Payload folder (required for IPA structure)
          mkdir -p Payload
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -n 1)
          cp -r "$APP_PATH" Payload/
          
          # 3. Zip it into an .ipa file
          zip -r MusicPlayer_Unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Unsigned-IPA-Build
          path: MusicPlayer_Unsigned.ipa
          retention-days: 5 # Keeps the file for 5 days
